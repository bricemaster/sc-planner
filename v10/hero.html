<!-- ============================================================
     HERO RECOMMENDATION — SC Planner v10
     ============================================================ -->
<section class="hero" id="heroSection">
  <div class="hero__inner">

    <!-- Left Column: Recommendation -->
    <div class="hero__rec">
      <span class="hero__label">Recommended Method</span>
      <h2 class="hero__method" id="heroMethod">—</h2>
      <p class="hero__reasoning" id="heroReasoning">Select a ship and configure your settings to get a personalized earning recommendation.</p>

      <div class="hero__actions">
        <button class="btn btn--ghost btn--sm" id="btnFullGuide">Full Guide</button>
        <button class="btn btn--ghost btn--sm" id="btnAlts">Alternatives</button>
        <button class="btn btn--ghost btn--sm" id="btnShare">Share</button>
      </div>
    </div>

    <!-- Right Column: Stat Grid -->
    <div class="hero__stats">
      <div class="hero__stat">
        <span class="hero__stat-label">Rate</span>
        <span class="hero__stat-value hero__stat-value--mono" id="heroRate">—</span>
      </div>
      <div class="hero__stat">
        <span class="hero__stat-label">Range</span>
        <span class="hero__stat-value hero__stat-value--sub" id="heroRange">—</span>
      </div>
      <div class="hero__stat">
        <span class="hero__stat-label">Confidence</span>
        <span class="hero__stat-value" id="heroConfidence">—</span>
      </div>
      <div class="hero__stat">
        <span class="hero__stat-label">Risk</span>
        <span class="hero__stat-value" id="heroRisk">—</span>
      </div>
    </div>

  </div>
</section>
