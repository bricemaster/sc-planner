  /* ---- DOM refs ---- */
  const listEl    = document.getElementById('shipList');
  const searchEl  = document.getElementById('shipSearch');
  const viewBtns  = document.querySelectorAll('.ships__view-btn');

  /* ---- Helpers ---- */
  function formatPrice(p) {
    if (p >= 1000000) return (p / 1000000).toFixed(1).replace(/\.0$/, '') + 'M aUEC';
    if (p >= 1000) return (p / 1000).toFixed(0) + 'K aUEC';
    return p.toLocaleString() + ' aUEC';
  }

  function tierClass(tier) {
    const map = { starter: 'starter', mid: 'mid', heavy: 'heavy', endgame: 'endgame' };
    return map[tier] || 'mid';
  }

  function chevronSVG() {
    return '<svg class="ships__chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  }

  /* ---- Render ship row ---- */
  function renderShipRow(ship) {
    const isActive = ship.id === activeShipId;
    const row = document.createElement('div');
    row.className = 'ship-row' + (isActive ? ' ship-row--active' : '');
    row.dataset.shipId = ship.id;
    row.setAttribute('role', 'button');
    row.setAttribute('tabindex', '0');
    row.innerHTML =
      '<span class="ship-row__name">' + ship.name + '</span>' +
      '<span class="ship-row__role">' + ship.role + '</span>' +
      '<span class="ship-row__price">' + formatPrice(ship.price) + '</span>' +
      '<span class="ship-row__tier ship-row__tier--' + tierClass(ship.tier) + '">' + ship.tier + '</span>';
    row.addEventListener('click', function () { selectShip(ship.id); });
    row.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectShip(ship.id); } });
    return row;
  }

  /* ---- Render accordion ---- */
  function renderAccordion() {
    listEl.innerHTML = '';
    listEl.classList.remove('ships__list--flat');
    const grouped = {};
    SHIPS.forEach(function (s) { (grouped[s.mfr] = grouped[s.mfr] || []).push(s); });

    MFR_ORDER.forEach(function (mfr) {
      const ships = grouped[mfr];
      if (!ships || ships.length === 0) return;

      const group = document.createElement('div');
      group.className = 'ships__group';
      const isOpen = expandedGroups.has(mfr);
      if (isOpen) group.classList.add('ships__group--open');

      // Header
      const header = document.createElement('button');
      header.className = 'ships__group-header';
      header.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
      header.innerHTML =
        '<span class="ships__mfr-name">' + mfr + '</span>' +
        '<span class="ships__mfr-count">' + ships.length + (ships.length === 1 ? ' ship' : ' ships') + '</span>' +
        chevronSVG();
      header.addEventListener('click', function () {
        if (expandedGroups.has(mfr)) expandedGroups.delete(mfr);
        else expandedGroups.add(mfr);
        renderAccordion();
      });
      group.appendChild(header);

      // Content
      const content = document.createElement('div');
      content.className = 'ships__group-content';
      ships.forEach(function (ship) { content.appendChild(renderShipRow(ship)); });
      group.appendChild(content);

      listEl.appendChild(group);
    });
  }

  /* ---- Render flat (search results) ---- */
  function renderFlat(ships) {
    listEl.innerHTML = '';
    listEl.classList.add('ships__list--flat');
    if (ships.length === 0) {
      listEl.innerHTML = '<div class="ships__empty">No ships match your search.</div>';
      return;
    }
    ships.forEach(function (ship) { listEl.appendChild(renderShipRow(ship)); });
  }

  /* ---- Search ---- */
  searchEl.addEventListener('input', function () {
    var q = searchEl.value.trim().toLowerCase();
    if (!q) { renderAccordion(); return; }
    var filtered = SHIPS.filter(function (s) {
      return s.name.toLowerCase().includes(q)
          || s.mfr.toLowerCase().includes(q)
          || s.role.toLowerCase().includes(q)
          || s.tier.toLowerCase().includes(q)
          || (s.desc && s.desc.toLowerCase().includes(q));
    });
    renderFlat(filtered);
  });

  /* ---- View toggle ---- */
  viewBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      currentView = btn.dataset.view;
      viewBtns.forEach(function (b) { b.classList.remove('ships__view-btn--active'); });
      btn.classList.add('ships__view-btn--active');
      listEl.setAttribute('data-view', currentView);
    });
  });

  /* ---- Select ship ---- */
  function selectShip(id) {
    activeShipId = id;
    // Re-render to update active state
    if (searchEl.value.trim()) {
      var q = searchEl.value.trim().toLowerCase();
      var filtered = SHIPS.filter(function (s) {
        return s.name.toLowerCase().includes(q) || s.mfr.toLowerCase().includes(q) || s.role.toLowerCase().includes(q);
      });
      renderFlat(filtered);
    } else {
      renderAccordion();
    }
    // Dispatch custom event for other sections to listen to
    var ship = SHIPS.find(function (s) { return s.id === id; });
    if (ship) {
      window.dispatchEvent(new CustomEvent('shipSelected', { detail: ship }));
    }
  }

  /* ---- Expose for external use ---- */
  window.SCShips = {
    getAll: function () { return SHIPS.slice(); },
    getById: function (id) { return SHIPS.find(function (s) { return s.id === id; }); },
    select: selectShip
  };

  /* ---- Init ---- */
  renderAccordion();
  listEl.setAttribute('data-view', currentView);

})();
</script>
